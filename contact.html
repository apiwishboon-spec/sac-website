<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | Suankularb Astronomy Club</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <div class="stars"></div>

    <nav>
        <div class="nav-container">
            <a href="index.html" class="logo">
                <i class="fas fa-meteor"></i> SKA CLUB
            </a>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="news.html">News</a></li>
                <li><a href="shop.html">Shop</a></li>
                <li><a href="contact.html" class="active">Contact</a></li>
            </ul>
        </div>
    </nav>

    <main>
        <section style="padding-top: 140px;">
            <div class="container" style="max-width: 800px;">
                <h1 class="section-title">Get in <span>Touch</span></h1>

                <div style="display: grid; grid-template-columns: 1fr; gap: 3rem;">
                    <form
                        style="background: var(--bg-card); padding: 3rem; border-radius: 20px; border: 1px solid var(--glass-border);">
                        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1.5rem;">
                            <input type="text" placeholder="Name"
                                style="width: 100%; padding: 0.75rem; border-radius: 8px; border: 1px solid var(--glass-border); background: rgba(0,0,0,0.2); color: white;">
                            <input type="email" placeholder="Email"
                                style="width: 100%; padding: 0.75rem; border-radius: 8px; border: 1px solid var(--glass-border); background: rgba(0,0,0,0.2); color: white;">
                        </div>
                        <textarea placeholder="Your Message" rows="5"
                            style="width: 100%; padding: 0.75rem; border-radius: 8px; border: 1px solid var(--glass-border); background: rgba(0,0,0,0.2); color: white; margin-bottom: 2rem;"></textarea>
                        <button type="submit" class="btn btn-primary" style="width: 100%;">Send Message</button>
                    </form>

                    <div
                        style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 2rem; text-align: center;">
                        <div>
                            <i class="fas fa-map-marker-alt"
                                style="font-size: 1.5rem; color: var(--secondary); margin-bottom: 1rem;"></i>
                            <p>Suankularb Wittayalai School<br>Bangkok, Thailand</p>
                        </div>
                        <div>
                            <i class="fas fa-envelope"
                                style="font-size: 1.5rem; color: var(--secondary); margin-bottom: 1rem;"></i>
                            <p>contact@skastronomy.club</p>
                        </div>
                        <div>
                            <i class="fab fa-facebook"
                                style="font-size: 1.5rem; color: var(--secondary); margin-bottom: 1rem;"></i>
                            <p>fb.com/ska.club</p>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>
</body>

</html>
